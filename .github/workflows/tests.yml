name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  smoke-playwright:
    name: Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install --with-deps
      
      - name: Run Playwright smoke tests
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TR_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
          TR_PASSWORD: ${{ secrets.TESTRAIL_PASSWORD }}
          TR_URL: https://sylwiamielnicka.testrail.io/
          TR_PROJECT: Example project
          TR_RUN_NAME: Smoke Tests (Playwright) - ${{ github.run_number }}
        run: |
          echo "EMAIL is set: $([ -n \"$EMAIL\" ] && echo 'yes' || echo 'no')"
          echo "PASSWORD is set: $([ -n \"$PASSWORD\" ] && echo 'yes' || echo 'no')"
          pytest tests/playwright_tests/ -m smoke -v --testrail
      
      - name: Upload test results (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-results
          path: |
            test-results/
            playwright-report/
      
      - name: Upload debug screenshots (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-screenshots
          path: debug.png
          if-no-files-found: ignore

  smoke-selenium:
    name: Smoke Tests (Selenium)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set up Chrome for Selenium
        uses: browser-actions/setup-chrome@latest
      
      - name: Verify Chrome installation
        run: |
          google-chrome --version || chromium --version || chromium-browser --version
          chromedriver --version
      
      - name: Run Selenium smoke tests
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TR_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
          TR_PASSWORD: ${{ secrets.TESTRAIL_PASSWORD }}
          TR_URL: https://sylwiamielnicka.testrail.io/
          TR_PROJECT: Example project
          TR_RUN_NAME: Smoke Tests (Selenium) - ${{ github.run_number }}
        run: |
          echo "EMAIL is set: $([ -n \"$EMAIL\" ] && echo 'yes' || echo 'no')"
          echo "PASSWORD is set: $([ -n \"$PASSWORD\" ] && echo 'yes' || echo 'no')"
          pytest tests/selenium_tests/ -m smoke -v --testrail
      
      - name: Upload test results (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-selenium-results
          path: |
            test-results/

  regression-playwright:
    name: Regression Tests (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install --with-deps
      
      - name: Run Playwright regression tests
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TR_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
          TR_PASSWORD: ${{ secrets.TESTRAIL_PASSWORD }}
          TR_URL: https://sylwiamielnicka.testrail.io/
          TR_PROJECT: Example project
          TR_RUN_NAME: Regression Tests (Playwright) - ${{ github.run_number }}
        run: |
          echo "EMAIL is set: $([ -n \"$EMAIL\" ] && echo 'yes' || echo 'no')"
          echo "PASSWORD is set: $([ -n \"$PASSWORD\" ] && echo 'yes' || echo 'no')"
          pytest tests/playwright_tests/ -m regression -v --testrail
      
      - name: Upload test results (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-results
          path: |
            test-results/
            playwright-report/
      
      - name: Upload debug screenshots (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-screenshots
          path: debug.png
          if-no-files-found: ignore

  regression-selenium:
    name: Regression Tests (Selenium)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set up Chrome for Selenium
        uses: browser-actions/setup-chrome@latest
      
      - name: Verify Chrome installation
        run: |
          google-chrome --version || chromium --version || chromium-browser --version
          chromedriver --version
      
      - name: Run Selenium regression tests
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TR_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
          TR_PASSWORD: ${{ secrets.TESTRAIL_PASSWORD }}
          TR_URL: https://sylwiamielnicka.testrail.io/
          TR_PROJECT: Example project
          TR_RUN_NAME: Regression Tests (Selenium) - ${{ github.run_number }}
        run: |
          echo "EMAIL is set: $([ -n \"$EMAIL\" ] && echo 'yes' || echo 'no')"
          echo "PASSWORD is set: $([ -n \"$PASSWORD\" ] && echo 'yes' || echo 'no')"
          pytest tests/selenium_tests/ -m regression -v --testrail
      
      - name: Upload test results (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-selenium-results
          path: |
            test-results/